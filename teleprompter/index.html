<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teleprompter</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Inter and Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- PWA & Mobile Optimization -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Prompter">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='128' fill='%230f172a'/%3E%3Cpath fill='%23fff' d='M150 150h212v40H276v172h-40V190h-86z'/%3E%3C/svg%3E">
  
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              400: '#a78bfa',
              500: '#8b5cf6',
              600: '#7c3aed',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="h-screen w-screen relative font-sans antialiased flex flex-col">

  <!-- ======================== -->
  <!-- TELEPROMPTER VIEW        -->
  <!-- ======================== -->
  <div id="view-prompter" class="w-full h-full absolute inset-0 z-0 flex flex-col items-center">
    
    <!-- Focus Indicator Line (Middle of screen) -->
    <div id="focus-line" class="absolute top-1/2 left-0 w-full h-px bg-brand-500/30 z-10 pointer-events-none shadow-[0_0_15px_rgba(139,92,246,0.3)]"></div>
    <div id="focus-arrows" class="absolute top-1/2 left-4 -translate-y-1/2 text-brand-500/50 z-10 pointer-events-none">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </div>

    <!-- Scroll Container -->
    <!-- The mirror class gets attached here via JS dynamically based on state -->
    <div id="prompter-container" class="w-full h-full overflow-y-auto px-4 md:px-12 relative z-0 mirror-y">
      <!-- padding to allow first line to start at middle -->
      <div id="padding-top" style="height: 50vh;"></div>
      
      <!-- Text content -->
      <div id="prompter-text" class="w-full max-w-4xl mx-auto text-6xl font-display font-medium leading-relaxed text-center" style="margin-left: auto; margin-right: auto; width: 100%;">
        <!-- Text injected via JS -->
      </div>

      <!-- padding to allow last line to scroll past middle -->
      <div id="padding-bottom" style="height: 50vh;"></div>
    </div>
  </div>


  <!-- ======================== -->
  <!-- EDIT MODE VIEW           -->
  <!-- ======================== -->
  <!-- Note: HUD hides when this is open -->
  <div id="view-editor" class="w-full h-full absolute inset-0 z-50 bg-slate-900 hidden flex flex-col p-6">
    <div class="flex justify-between items-center mb-6">
      <div class="flex items-center gap-3">
        <h2 class="text-3xl font-display font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-400 to-indigo-400 mr-4">Edit Script</h2>
        <button id="btn-clear-script" class="px-3 py-2 bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-400 rounded-lg flex items-center gap-2 transition-colors border border-slate-700/50 hover:border-red-500/50 text-sm font-semibold">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          Clear
        </button>
        <button id="btn-paste-script" class="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-slate-200 rounded-lg flex items-center gap-2 transition-colors border border-slate-700/50 text-sm font-semibold">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
          Paste
        </button>
      </div>
      <button id="btn-save-script" class="px-6 py-2.5 bg-brand-600 hover:bg-brand-500 text-white rounded-full font-semibold transition-all shadow-[0_0_15px_rgba(124,58,237,0.4)]">
        Save & Return
      </button>
    </div>
    <textarea id="script-textarea" class="flex-1 w-full bg-slate-800/80 border border-slate-700/50 rounded-2xl p-6 text-2xl text-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none font-sans leading-relaxed transition-all shadow-inner"></textarea>
  </div>


  <!-- ======================== -->
  <!-- FLOATING SETTINGS HUD    -->
  <!-- ======================== -->
  <!-- HUD moved to absolute bottom of the screen per specs -->
  <div id="settings-hud" class="absolute bottom-6 left-1/2 -translate-x-1/2 z-30 w-[95%] max-w-5xl transition-all-smooth">
    <div class="glass-panel p-4 rounded-2xl shadow-2xl shadow-black/50 flex flex-wrap lg:flex-nowrap items-center justify-between gap-4">
      
      <!-- Primary Core: Edit & Play -->
      <div class="flex items-center gap-3">
        <button id="btn-edit" class="p-3 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 transition-colors tooltip group relative shadow-md">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
        </button>
        
        <button id="btn-play-pause" class="w-14 h-14 rounded-full bg-brand-600 hover:bg-brand-500 flex items-center justify-center text-white shadow-[0_0_20px_rgba(124,58,237,0.6)] transition-transform hover:scale-105 active:scale-95 shrink-0">
          <svg id="icon-play" class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
      </div>

      <!-- Config Buttons (Replaced sliders with + / -) -->
      <div class="flex flex-wrap items-center justify-center gap-6 text-sm font-semibold text-slate-300">
        
        <!-- Speed -->
        <div class="flex items-center gap-2 bg-slate-800/60 rounded-xl p-1.5 border border-slate-700/50">
          <span class="px-2 font-display text-slate-400">SPD</span>
          <button id="btn-speed-minus" class="w-8 h-8 rounded-lg bg-slate-700 hover:bg-slate-600 flex items-center justify-center active:scale-95 transition-transform">-</button>
          <span id="label-speed" class="w-10 text-center font-mono text-brand-300">2.0</span>
          <button id="btn-speed-plus" class="w-8 h-8 rounded-lg bg-slate-700 hover:bg-slate-600 flex items-center justify-center active:scale-95 transition-transform">+</button>
        </div>

        <!-- Size -->
        <div class="flex items-center gap-2 bg-slate-800/60 rounded-xl p-1.5 border border-slate-700/50">
          <span class="px-2 font-display text-slate-400">TXT</span>
          <button id="btn-font-minus" class="w-8 h-8 rounded-lg bg-slate-700 hover:bg-slate-600 flex items-center justify-center active:scale-95 transition-transform">-</button>
          <span id="label-font" class="w-12 text-center font-mono text-brand-300">60px</span>
          <button id="btn-font-plus" class="w-8 h-8 rounded-lg bg-slate-700 hover:bg-slate-600 flex items-center justify-center active:scale-95 transition-transform">+</button>
        </div>

        <!-- Margin -->
        <div class="flex items-center gap-2 bg-slate-800/60 rounded-xl p-1.5 border border-slate-700/50">
          <span class="px-2 font-display text-slate-400">MRG</span>
          <button id="btn-margin-minus" class="w-8 h-8 rounded-lg bg-slate-700 hover:bg-slate-600 flex items-center justify-center active:scale-95 transition-transform">-</button>
          <span id="label-margin" class="w-12 text-center font-mono text-brand-300">100%</span>
          <button id="btn-margin-plus" class="w-8 h-8 rounded-lg bg-slate-700 hover:bg-slate-600 flex items-center justify-center active:scale-95 transition-transform">+</button>
        </div>
      </div>

      <!-- Mirror Toggle -->
      <button id="btn-mirror" class="px-5 py-3 rounded-xl bg-brand-600/20 hover:bg-brand-600/40 text-brand-300 border border-brand-500/30 transition-colors flex gap-2 items-center font-bold">
        <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
        <span id="mirror-label">Mirror: Y</span>
      </button>

    </div>
  </div>

  <!-- External JS - Version bumped to bust cache -->
  <script src="script.js?v=5"></script>
  
  <!-- Service Worker Registration for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          })
          .catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</body>
</html>
